specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # ArcMarketplace contract
  - kind: ethereum
    name: ArcMarketplace
    network: arc-testnet
    source:
      address: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      abi: ArcMarketplace
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Listing
        - Auction
        - Sale
        - NFT
        - User
        - Collection
        - Bid
        - MarketplaceStats
        - DailyStats
      abis:
        - name: ArcMarketplace
          file: ./abis/ArcMarketplace.json
        - name: ERC721
          file: ./abis/ERC721.json
      eventHandlers:
        # Listing events (ID-based)
        - event: ListingCreated(indexed uint256,indexed address,address,uint256,uint256)
          handler: handleListingCreated
        - event: ListingCancelled(indexed uint256)
          handler: handleListingCancelled
        - event: ListingSold(indexed uint256,indexed address,uint256)
          handler: handleListingSold
        # Auction events (ID-based)
        - event: AuctionCreated(indexed uint256,indexed address,address,uint256,uint256,uint256)
          handler: handleAuctionCreated
        - event: BidPlaced(indexed uint256,indexed address,uint256)
          handler: handleBidPlaced
        - event: AuctionEnded(indexed uint256,indexed address,uint256)
          handler: handleAuctionEnded
        - event: AuctionCancelled(indexed uint256)
          handler: handleAuctionCancelled
        - event: AuctionExtended(indexed uint256,uint256)
          handler: handleAuctionExtended
        # Admin events
        - event: PlatformFeeUpdated(uint256)
          handler: handlePlatformFeeUpdated
        - event: EarningsWithdrawn(indexed address,uint256)
          handler: handleEarningsWithdrawn
      file: ./src/nft-marketplace.ts

  # FeeVault contract
  - kind: ethereum
    name: FeeVault
    network: arc-testnet
    source:
      address: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      abi: FeeVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - FeeDistribution
        - FeeSplit
      abis:
        - name: FeeVault
          file: ./abis/FeeVault.json
      eventHandlers:
        - event: Distributed(indexed address,indexed uint256,uint256)
          handler: handleDistributed
        - event: GlobalSplitsUpdated((address,uint16)[])
          handler: handleGlobalSplitsUpdated
        - event: CollectionSplitsUpdated(indexed address)
          handler: handleCollectionSplitsUpdated
      file: ./src/fee-vault.ts

  # ProfileRegistry contract
  - kind: ethereum
    name: ProfileRegistry
    network: arc-testnet
    source:
      address: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"
      abi: ProfileRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Profile
        - User
      abis:
        - name: ProfileRegistry
          file: ./abis/ProfileRegistry.json
      eventHandlers:
        - event: ProfileUpdated(indexed address,string)
          handler: handleProfileUpdated
      file: ./src/profile-registry.ts

  # ArcTokenFactory contract
  - kind: ethereum
    name: ArcTokenFactory
    network: arc-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ArcTokenFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LaunchedToken
        - AmmTokenLookup
        - TokenLauncherStats
      abis:
        - name: ArcTokenFactory
          file: ./abis/ArcTokenFactory.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,indexed address,string,string,uint256,uint256,uint256)
          handler: handleTokenCreated
      file: ./src/arc-token-factory.ts

templates:
  # ArcBondingCurveAMM — one per launched token, instantiated by factory handler
  - kind: ethereum
    name: ArcBondingCurveAMM
    network: arc-testnet
    source:
      abi: ArcBondingCurveAMM
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LaunchedToken
        - TokenTrade
        - TokenGraduation
        - TokenStake
        - TokenRewardClaim
        - CreatorWithdrawal
        - AmmTokenLookup
        - TokenLauncherStats
      abis:
        - name: ArcBondingCurveAMM
          file: ./abis/ArcBondingCurveAMM.json
      eventHandlers:
        - event: TokensBought(indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleTokensBought
        - event: TokensSold(indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleTokensSold
        - event: TokenGraduated(uint256,uint256,uint256,uint256,uint256)
          handler: handleTokenGraduated
        - event: StakingStarted(indexed address,uint256,uint256)
          handler: handleStakingStarted
        - event: StakingRewardsClaimed(indexed address,uint256,uint256,uint256)
          handler: handleStakingRewardsClaimed
        - event: CreatorReserveWithdrawn(indexed address,uint256,string,uint256)
          handler: handleCreatorReserveWithdrawn
      file: ./src/arc-bonding-curve-amm.ts
