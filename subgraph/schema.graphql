type User @entity {
  id: ID! # wallet address (lowercase hex)
  address: Bytes!
  nftsOwned: [NFT!]! @derivedFrom(field: "owner")
  listings: [Listing!]! @derivedFrom(field: "seller")
  bids: [Bid!]! @derivedFrom(field: "bidder")
  salesAsBuyer: [Sale!]! @derivedFrom(field: "buyer")
  profile: Profile
  totalSpent: BigInt!
  totalEarned: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Profile @entity {
  id: ID! # same as user id
  user: User!
  metadataURI: String!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Collection @entity {
  id: ID! # contract address (lowercase hex)
  address: Bytes!
  name: String
  symbol: String
  nfts: [NFT!]! @derivedFrom(field: "collection")
  floorPrice: BigInt
  totalVolume: BigInt!
  totalSales: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type NFT @entity {
  id: ID! # collectionAddress-tokenId
  tokenId: BigInt!
  collection: Collection!
  creator: String
  owner: String!
  tokenURI: String
  listing: Listing
  auction: Auction
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Listing @entity {
  id: ID! # on-chain listingId
  listingId: BigInt!
  collection: Collection!
  nft: NFT!
  seller: User!
  price: BigInt!
  active: Boolean!
  sale: Sale
  createdAt: BigInt!
  updatedAt: BigInt!
  cancelledAt: BigInt
  soldAt: BigInt
}

type Auction @entity {
  id: ID! # on-chain auctionId
  auctionId: BigInt!
  collection: Collection!
  nft: NFT!
  seller: User!
  startingPrice: BigInt!
  highestBid: BigInt
  highestBidder: User
  endTime: BigInt!
  extensionCount: Int!
  active: Boolean!
  settled: Boolean!
  bids: [Bid!]! @derivedFrom(field: "auction")
  sale: Sale
  createdAt: BigInt!
  settledAt: BigInt
}

type Bid @entity {
  id: ID! # auctionId-bid-index
  auction: Auction!
  bidder: User!
  amount: BigInt!
  refunded: Boolean!
  refundedAt: BigInt
  createdAt: BigInt!
}

type Sale @entity {
  id: ID! # txHash-logIndex
  collection: Collection!
  nft: NFT!
  seller: String!
  buyer: User!
  price: BigInt!
  saleType: String! # "Listing" or "Auction"
  listing: Listing
  auction: Auction
  protocolFee: BigInt!
  royaltyFee: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

type FeeDistribution @entity {
  id: ID! # txHash-logIndex
  collection: Collection!
  tokenId: BigInt!
  amount: BigInt!
  collectionSplits: [String!]!
  globalSplits: [String!]!
  createdAt: BigInt!
  txHash: Bytes!
}

type FeeSplit @entity {
  id: ID!
  recipient: Bytes!
  bps: Int!
  collection: Collection
}

type MarketplaceStats @entity {
  id: ID! # "marketplace" singleton
  totalVolume: BigInt!
  totalSales: BigInt!
  totalListings: BigInt!
  activeListings: BigInt!
  totalAuctions: BigInt!
  activeAuctions: BigInt!
  totalUsers: BigInt!
  totalCollections: BigInt!
  protocolFeeBps: Int!
  updatedAt: BigInt!
}

type DailyStats @entity {
  id: ID! # day timestamp
  date: BigInt!
  volume: BigInt!
  sales: BigInt!
  newUsers: BigInt!
  activeUsers: BigInt!
  newListings: BigInt!
  newAuctions: BigInt!
}

# ========== Token Launcher Entities ==========

type LaunchedToken @entity {
  id: ID! # token contract address (lowercase hex)
  address: Bytes!
  amm: Bytes!
  creator: Bytes!
  name: String!
  symbol: String!
  totalSupply: BigInt!
  creationFee: BigInt!
  soldSupply: BigInt! # net tokens sold via bonding curve (buys - sells)
  totalVolume: BigInt!
  totalTrades: BigInt!
  isGraduated: Boolean!
  graduation: TokenGraduation
  trades: [TokenTrade!]! @derivedFrom(field: "token")
  stakes: [TokenStake!]! @derivedFrom(field: "token")
  createdAt: BigInt!
  updatedAt: BigInt!
}

type TokenTrade @entity {
  id: ID! # txHash-logIndex
  token: LaunchedToken!
  trader: Bytes!
  tradeType: String! # "Buy" or "Sell"
  usdcAmount: BigInt!
  tokenAmount: BigInt!
  platformFee: BigInt!
  newPrice: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

type TokenGraduation @entity {
  id: ID! # token address
  token: LaunchedToken!
  creatorReserve: BigInt!
  stakingRewardPool: BigInt!
  platformFee: BigInt!
  finalSupply: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

type TokenStake @entity {
  id: ID! # txHash-logIndex
  token: LaunchedToken!
  user: Bytes!
  amount: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

type TokenRewardClaim @entity {
  id: ID! # txHash-logIndex
  token: LaunchedToken!
  user: Bytes!
  rewardAmount: BigInt!
  tokensStaked: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

type CreatorWithdrawal @entity {
  id: ID! # txHash-logIndex
  token: LaunchedToken!
  creator: Bytes!
  amount: BigInt!
  reason: String!
  createdAt: BigInt!
  txHash: Bytes!
}

type TokenLauncherStats @entity {
  id: ID! # "token-launcher" singleton
  totalTokens: BigInt!
  totalVolume: BigInt!
  totalTrades: BigInt!
  totalGraduated: BigInt!
  updatedAt: BigInt!
}

type AmmTokenLookup @entity {
  id: ID! # AMM address (lowercase hex) — reverse lookup
  token: LaunchedToken!
}
